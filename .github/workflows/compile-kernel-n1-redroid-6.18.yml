name: 编译 N1 Redroid 6.18 内核

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: "选择内核源码仓库"
        required: false
        default: "unifreq"
        type: choice
        options:
          - unifreq
          - ophub
      kernel_auto:
        description: "自动跟进 6.18.y 最新小版本"
        required: false
        default: true
        type: boolean
      kernel_toolchain:
        description: "选择编译工具链"
        required: false
        default: "gcc"
        type: choice
        options:
          - clang
          - gcc
          - gcc-15.2
          - gcc-14.3
          - gcc-14.2
      ccache_clear:
        description: "编译前清空 ccache"
        required: false
        default: false
        type: boolean
      docker_image:
        description: "选择 Armbian Docker 镜像"
        required: false
        default: "trixie"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble

permissions:
  contents: write

env:
  TZ: Etc/UTC
  KERNEL_VERSION: 6.18.y
  KERNEL_CONFIG_DIR: kernel-config/redroid-psi
  KERNEL_CONFIG_FILE: kernel-config/redroid-psi/config-6.18
  RELEASE_TAG: kernel_n1_redroid_6.18
  KERNEL_SIGN: -n1-redroid

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 初始化编译环境
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: 创建扩展编译磁盘
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: 准备 N1 redroid 内核配置
        id: kernelconfig
        run: |
          config_dir="${GITHUB_WORKSPACE}/${KERNEL_CONFIG_DIR}"
          config_file="${GITHUB_WORKSPACE}/${KERNEL_CONFIG_FILE}"

          mkdir -p "${config_dir}"
          curl -fsSL \
            "https://raw.githubusercontent.com/ophub/kernel/main/kernel-config/release/stable/config-6.18" \
            -o "${config_file}"

          set_config_y() {
            local key="$1"
            if grep -qE "^${key}=.*" "${config_file}"; then
              sed -i "s|^${key}=.*|${key}=y|" "${config_file}"
              return
            fi
            if grep -qE "^# ${key} is not set$" "${config_file}"; then
              sed -i "s|^# ${key} is not set$|${key}=y|" "${config_file}"
              return
            fi
            echo "${key}=y" >> "${config_file}"
          }

          set_config_n() {
            local key="$1"
            if grep -qE "^${key}=.*" "${config_file}"; then
              sed -i "s|^${key}=.*|# ${key} is not set|" "${config_file}"
              return
            fi
            if grep -qE "^# ${key} is not set$" "${config_file}"; then
              return
            fi
            echo "# ${key} is not set" >> "${config_file}"
          }

          set_config_y "CONFIG_PSI"
          set_config_n "CONFIG_PSI_DEFAULT_DISABLED"

          grep -q '^CONFIG_PSI=y$' "${config_file}"
          grep -q '^# CONFIG_PSI_DEFAULT_DISABLED is not set$' "${config_file}"

          echo "已生成配置文件: ${config_file}"
          grep -E '^(CONFIG_PSI=y|# CONFIG_PSI_DEFAULT_DISABLED is not set)$' "${config_file}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: 获取内核源码提交哈希
        id: kernelhash
        run: |
          api_url="https://api.github.com/repos/${{ inputs.kernel_source }}/linux-${KERNEL_VERSION}/git/ref/heads/main"
          source_hash=$(curl -fsSL -m 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "${api_url}" |
              jq -r '.object.sha'
          )
          [[ -z "${source_hash}" || "${source_hash}" == "null" ]] && source_hash="${{ github.sha }}"
          echo "source_hash=${source_hash}" >> "${GITHUB_ENV}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: 缓存 ccache
        uses: actions/cache@v5
        with:
          path: /builder/ccache
          key: kernel-n1-redroid-${{ inputs.kernel_toolchain }}-${{ env.KERNEL_VERSION }}-${{ env.source_hash }}
          restore-keys: |
            kernel-n1-redroid-${{ inputs.kernel_toolchain }}-${{ env.KERNEL_VERSION }}-

      - name: 编译 N1 Redroid 6.18 内核
        uses: ./
        if: ${{ steps.disk.outputs.status == 'success' && steps.kernelconfig.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: kernel
          kernel_source: ${{ inputs.kernel_source }}
          kernel_version: ${{ env.KERNEL_VERSION }}
          kernel_auto: ${{ inputs.kernel_auto }}
          delete_source: true
          kernel_package: all
          kernel_sign: ${{ env.KERNEL_SIGN }}
          kernel_toolchain: ${{ inputs.kernel_toolchain }}
          ccache_clear: ${{ inputs.ccache_clear }}
          docker_hostpath: /builder
          docker_image: ophub/armbian-${{ inputs.docker_image }}:arm64
          kernel_config: ${{ env.KERNEL_CONFIG_DIR }}

      - name: 上传 N1 Redroid 内核到 Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ env.RELEASE_TAG }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            - 该发布用于 N1（Phicomm N1 / s905d）准备 redroid Docker 所需的 6.18.y 内核。
            - 在上游 stable `config-6.18` 基础上启用了 `CONFIG_PSI=y`。
            - 在上游 stable `config-6.18` 基础上关闭了 `CONFIG_PSI_DEFAULT_DISABLED`，等效于 `CONFIG_PSI_DEFAULT_DISABLED=n`。
            - 编译链路继续复用仓库现有内核构建流程，仅对 redroid 所需 PSI 配置做最小定制。
